<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delete Expense</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-6 rounded-xl shadow-md border border-gray-100 w-full max-w-md text-center">
        <div class="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
        </div>
        <h2 class="text-xl font-bold mb-2 text-gray-800">Confirm Deletion</h2>
        <p class="text-gray-500 text-sm mb-6">Are you sure you want to permanently delete your expense for <span class="font-semibold text-gray-800">"{{ expense.title }}"</span>?</p>
        <form method="POST">
            {% csrf_token %}
            <div class="flex items-center justify-center gap-3">
                <a href="{% url 'expense_list' %}" class="w-1/2 px-4 py-2 border border-gray-200 text-gray-600 rounded-lg hover:bg-gray-50 transition">Cancel</a>
                <button type="submit" class="w-1/2 px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 font-semibold shadow transition cursor-pointer">Delete</button>
            </div>
        </form>
    </div>
</body>
</html>
